# Per-test time cap (project-wide). Any test method that runs longer than this
# fails with a TimeoutException instead of hanging. SEPARATE_THREAD ensures the
# cap fires even if the test code ignores interrupts. The surefire
# forkedProcessTimeoutInSeconds in pom.xml is the JVM-level backstop on top of this.
junit.jupiter.execution.timeout.default = 20 s
junit.jupiter.execution.timeout.thread.mode.default = SEPARATE_THREAD
